{
  "package": {
    "name": "askme",
    "version": "0.2.0",
    "author": "SDD project",
    "language": "zh-TW",
    "category": "governance",
    "default_profile": "bank-aigov-inherent-risk",
    "default_mode": "auto"
  },
  "routes": {
    "auto": {
      "entry_command": "/askme",
      "confidence_threshold": 0.75,
      "ordered_nodes": ["intake", "missing", "questions", "impact", "pack"]
    },
    "content_order": ["why", "who", "how", "what", "roi", "when", "risk"]
  },
  "stop_rules": [
    "輸入不是去識別化文字",
    "profile 無法判定",
    "project_owner、system_scope、data_sensitivity 任一 blocker 缺失且流程即將進入 pack",
    "使用者要求 PDF、PPTX 或 diagram 匯出"
  ],
  "nodes": {
    "askme": {
      "skill_name": "askme",
      "command": "/askme",
      "description": "銀行送審前的 pre-review conductor。把去識別化的模糊輸入收整成缺失欄位、預期問題、影響範圍與 markdown 補件草稿。只做送審前收斂，不做最終核定。",
      "short_description": "銀行送審前缺口收斂與問題揭露工具箱",
      "emoji": "🧭",
      "runtime_path": "SKILL.md",
      "codex_path": "dist/codex/askme.md",
      "vscode_path": "dist/vscode/askme.prompt.md"
    },
    "intake": {
      "skill_name": "askme.intake",
      "command": "/askme.intake",
      "description": "把去識別化的模糊需求、郵件摘要、會議筆記收整成初始 case packet。",
      "short_description": "askme intake node",
      "emoji": "📥",
      "runtime_path": "intake/SKILL.md",
      "codex_path": "dist/codex/askme.intake.md",
      "vscode_path": "dist/vscode/askme.intake.prompt.md"
    },
    "missing": {
      "skill_name": "askme.missing",
      "command": "/askme.missing",
      "description": "依 profile 規則把 case packet 拆成 blocker 與 follow-up，形成缺失欄位清單。",
      "short_description": "askme missing node",
      "emoji": "🧩",
      "runtime_path": "missing/SKILL.md",
      "codex_path": "dist/codex/askme.missing.md",
      "vscode_path": "dist/vscode/askme.missing.prompt.md"
    },
    "questions": {
      "skill_name": "askme.questions",
      "command": "/askme.questions",
